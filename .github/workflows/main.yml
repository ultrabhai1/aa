name: Run Telegram Bot

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python libraries
        run: |
          pip install --upgrade pip
          pip install pyTelegramBotAPI pymongo aiohttp psutil pytz

      - name: Compile C++
        run: |
          g++ -std=c++11 -pthread -o soul soul.cpp
          chmod +x soul

      - name: Run Bot
        run: |
          python ultra.py
