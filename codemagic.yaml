workflows:
  ultra_python_runner:
    name: Ultra Python Runner
    max_build_duration: 60

    environment:
      xcode: latest   # required dummy (ignore)

    scripts:
      - name: Check project files
        script: |
          echo "Project files:"
          ls -la

      - name: Install Python & dependencies
        script: |
          python3 --version
          python3 -m pip install --upgrade pip
          pip3 install aiohttp pyTelegramBotAPI pymongo pytz psutil

      - name: Give permission to binary
        script: |
          chmod +x ultra

      - name: Run ultra.py
        script: |
          python3 ultra.py
