workflows:
  ultra_python_runner:
    name: Ultra Python Runner
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Check project files
        script: |
          echo "Project files:"
          ls -la

      - name: Install dependencies
        script: |
          python3 -m pip install --upgrade pip
          pip3 install python-telegram-bot==20.7

      - name: Give permission to binary
        script: |
          chmod +x ultra

      - name: Run ultra.py
        script: |
          python3 ultra.py
