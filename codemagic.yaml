workflows:
  telegram-bot:
    name: Run Bot with C++11 Program

    scripts:
      - echo "ULTRA BHAI BOT START..."

      # System update
      - apt-get update

      # Install g++
      - apt-get install -y g++

      # Python setup
      - pip3 install --upgrade pip
      - pip3 install pyTelegramBotAPI pymongo aiohttp psutil pytz

      # Compile C++
      - g++ -std=c++11 -pthread -o soul soul.cpp

      # Permission
      - chmod +x soul

      # Debug
      - ls -la

      # Run bot
      - python3 ultra.py
