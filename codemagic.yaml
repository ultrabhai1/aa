workflows:
  ultra_python_runner:
    name: Ultra Python Runner
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Check project files
        script: |
          echo "📂 Files:"
          ls -la

      - name: Install dependencies
        script: |
          python3 -m pip install --upgrade pip
          pip3 install python-telegram-bot==20.7

      - name: Check binary info
        script: |
          echo "🔍 Binary Info:"
          file ultra || echo "❌ ultra file not found"

      - name: Give permission
        script: |
          chmod +x ultra || true

      - name: Run binary (show output + error)
        script: |
          echo "🚀 Running binary..."
          ./ultra 2>&1 || echo "❌ Binary failed but continuing..."

      - name: Run Python bot
        script: |
          python3 ultra.py
