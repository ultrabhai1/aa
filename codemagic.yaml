name: Run Telegram Bot

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python Libraries
        run: |
          pip install --upgrade pip
          pip install python-telegram-bot  # correct library
          # Add other dependencies only if your script actually uses them:
          # pip install pymongo aiohttp psutil pytz

      - name: Compile C++ Binary
        run: |
          g++ -std=c++14 -pthread -o soul soul.cpp
          chmod +x soul

      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python ultra.py
